 <style>
    /* =============================================
       TOKENS
    ============================================= */
    :root {
      --purple:      #2D1B69;
      --purple-dark: #1E1148;
      --purple-mid:  #3D2880;
      --gold:        #C9A84C;
      --gold-light:  #E2C46E;
      --red:         #B92B27;
      --off-white:   #F8F6F0;
      --warm-gray:   #EAE6DC;
      --mid-gray:    #8A8070;
      --dark:        #1A1A1A;
      --text:        #2C2C2C;

      --ff-display: 'Playfair Display', Georgia, serif;
      --ff-body:    'Inter', system-ui, sans-serif;

      --radius:    4px;
      --radius-lg: 8px;
      --shadow:    0 2px 16px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.18);

      --section-pad: 80px 0;
      --container:   1140px;
    }

    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--ff-body);
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }

    img { display: block; max-width: 100%; }
    a   { color: inherit; text-decoration: none; }

    /* =============================================
       UTILITY
    ============================================= */
    .container {
      max-width: var(--container);
      margin: 0 auto;
      padding: 0 24px;
    }

    .btn {
      display: inline-block;
      font-family: var(--ff-body);
      font-weight: 600;
      font-size: 0.875rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 14px 32px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 2px solid transparent;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-gold          { background: var(--gold); color: var(--purple-dark); }
    .btn-gold:hover    { background: var(--gold-light); }

    .btn-outline-gold       { background: transparent; color: var(--gold); border-color: var(--gold); }
    .btn-outline-gold:hover { background: var(--gold); color: var(--purple-dark); }

    .btn-outline-white       { background: transparent; color: #fff; border-color: rgba(255,255,255,0.6); }
    .btn-outline-white:hover { background: rgba(255,255,255,0.12); border-color: #fff; }

    .eyebrow {
      font-family: var(--ff-body);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .section-heading {
      font-family: var(--ff-display);
      font-size: clamp(1.75rem, 3vw, 2.5rem);
      font-weight: 700;
      line-height: 1.2;
      color: var(--purple-dark);
    }

    .stars {
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 2px;
    }

    /* =============================================
       ANNOUNCEMENT BAR
    ============================================= */
    .announce-bar {
      background: var(--red);
      color: #fff;
      text-align: center;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 9px 24px;
    }

    .announce-bar a {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* =============================================
       NAVBAR
    ============================================= */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--purple-dark);
      border-bottom: 2px solid var(--gold);
    }

    .navbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 24px;
    }

    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .navbar-logo img { height: 44px; width: auto; }

    .navbar-logo-text {
      font-family: var(--ff-display);
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
    }

    .navbar-logo-text span {
      display: block;
      font-family: var(--ff-body);
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
      transition: color 0.15s;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .nav-phone {
      font-family: var(--ff-body);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gold);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .nav-phone:hover { color: var(--gold-light); }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
    }

    .nav-toggle span {
      display: block;
      width: 24px;
      height: 2px;
      background: #fff;
      margin: 5px 0;
      transition: all 0.2s;
    }

    /* =============================================
       INTERIOR PAGE HERO (used on all non-home pages)
    ============================================= */
    .page-hero {
      background: var(--purple-dark);
      padding: 56px 0 48px;
      border-bottom: 2px solid var(--gold);
    }

    .page-hero .eyebrow { margin-bottom: 10px; }

    .page-hero h1 {
      font-family: var(--ff-display);
      font-size: clamp(1.75rem, 3.5vw, 2.75rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .page-hero p {
      font-size: 1rem;
      color: rgba(255,255,255,0.72);
      max-width: 560px;
      font-weight: 300;
    }

    /* =============================================
       FOOTER
    ============================================= */
    footer {
      background: var(--purple-dark);
      border-top: 2px solid var(--gold);
      color: rgba(255,255,255,0.65);
      padding: 48px 0 28px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 48px;
      margin-bottom: 40px;
    }

    .footer-brand img { height: 52px; margin-bottom: 16px; }

    .footer-brand p {
      font-size: 0.85rem;
      line-height: 1.7;
      max-width: 280px;
      margin-bottom: 16px;
    }

    .footer-col h4 {
      font-family: var(--ff-body);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .footer-col ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-col ul li a {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.65);
      transition: color 0.15s;
    }

    .footer-col ul li a:hover { color: var(--gold); }

    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      flex-wrap: wrap;
      gap: 10px;
    }

    /* =============================================
       SOCIAL STRIP
    ============================================= */
    .social-strip {
      background: var(--purple-mid);
      padding: 40px 0;
    }

    .social-strip-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }

    .social-strip p {
      font-family: var(--ff-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
    }

    .social-icons { display: flex; gap: 14px; }

    .social-icon {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.8);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 9px 18px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 100px;
      transition: background 0.15s, color 0.15s;
    }

    .social-icon:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 768px) {
      :root { --section-pad: 56px 0; }

      .nav-links, .nav-phone { display: none; }
      .nav-toggle { display: block; }

      .nav-links.open {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 68px;
        left: 0;
        right: 0;
        background: var(--purple-dark);
        padding: 20px 24px;
        gap: 16px;
        border-bottom: 2px solid var(--gold);
        z-index: 200;
      }

      .footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .social-strip-inner { flex-direction: column; text-align: center; }
      .social-icons { justify-content: center; flex-wrap: wrap; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; }
    }

    {{ page.page_styles }}
  </style>

      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
